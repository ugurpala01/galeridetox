<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=512, height=512">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 512px; 
      height: 512px; 
      background: #2E7D32;
      overflow: hidden;
    }
    .container {
      position: relative;
      width: 512px;
      height: 512px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-wrapper {
      position: relative;
      width: 360px;
      height: 280px;
    }
    /* Photo frame */
    .frame {
      position: absolute;
      left: 0;
      top: 20px;
      width: 200px;
      height: 160px;
      border: 14px solid white;
      border-radius: 20px;
      overflow: hidden;
      background: #2E7D32;
    }
    .mountain1 {
      position: absolute;
      bottom: 0;
      left: -10px;
      width: 0;
      height: 0;
      border-left: 70px solid transparent;
      border-right: 50px solid transparent;
      border-bottom: 80px solid rgba(255,255,255,0.95);
    }
    .mountain2 {
      position: absolute;
      bottom: 0;
      left: 60px;
      width: 0;
      height: 0;
      border-left: 60px solid transparent;
      border-right: 60px solid transparent;
      border-bottom: 60px solid rgba(255,255,255,0.75);
    }
    .sun {
      position: absolute;
      width: 28px;
      height: 28px;
      background: white;
      border-radius: 50%;
      top: 16px;
      right: 20px;
    }
    /* Trash can */
    .trash {
      position: absolute;
      right: 0;
      bottom: 20px;
      width: 140px;
      height: 160px;
    }
    .trash-handle {
      width: 50px;
      height: 14px;
      background: white;
      border-radius: 4px;
      margin: 0 auto 6px;
    }
    .trash-lid {
      width: 110px;
      height: 16px;
      background: white;
      border-radius: 4px;
      margin: 0 auto;
    }
    .trash-body {
      width: 140px;
      height: 120px;
      background: white;
      border-radius: 10px;
      margin-top: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
    }
    .line {
      width: 16px;
      height: 70px;
      background: #2E7D32;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <div class="frame">
        <div class="mountain1"></div>
        <div class="mountain2"></div>
        <div class="sun"></div>
      </div>
      <div class="trash">
        <div class="trash-handle"></div>
        <div class="trash-lid"></div>
        <div class="trash-body">
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
