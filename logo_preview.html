<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f0f0;
    }
    .container {
      text-align: center;
    }
    .logo {
      max-width: 512px;
      max-height: 512px;
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .title {
      margin-top: 24px;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 24px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/logo.png" alt="Galeri Detoks Logo" class="logo">
    <div class="title">Mevcut Logo</div>
  </div>
</body>
</html>
