name: galeri_detoks
description: "WhatsApp ve galerideki kutlama mesajı görsellerini OCR ile tespit edip silen fotoğraf temizleme uygulaması."
publish_to: 'none'

version: 1.0.0+5

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter



  cupertino_icons: ^1.0.8

  # Galeri erişimi
  photo_manager: ^3.6.0

  # İzin yönetimi
  permission_handler: ^11.3.1

  # OCR - Metin tanıma
  google_mlkit_text_recognition: ^0.13.0

  # State management
  flutter_riverpod: ^2.5.1

  # Yardımcı paketler
  path_provider: ^2.1.4

  # Local notifications
  flutter_local_notifications: ^17.2.4

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logonew.png"

flutter:
  uses-material-design: true
